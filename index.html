<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Tracker — Options Premium Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ee;
    --surface: #fdfaf6;
    --surface2: #f4efe8;
    --border: rgba(139,107,78,0.14);
    --border2: rgba(139,107,78,0.09);
    --text: #2c1f10;
    --text2: #6b5240;
    --text3: #a89282;
    --blue: #3d6b9e;
    --blue-bg: rgba(61,107,158,0.07);
    --blue-border: rgba(61,107,158,0.2);
    --purple: #7c5cbf;
    --purple-bg: rgba(124,92,191,0.07);
    --green: #3a7d44;
    --green-bg: rgba(58,125,68,0.08);
    --red: #b94040;
    --red-bg: rgba(185,64,64,0.07);
    --amber: #9a6b1a;
    --amber-bg: rgba(154,107,26,0.09);
    --gray: #8a7a6e;
    --gray-bg: rgba(138,122,110,0.08);
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --display: 'Lora', Georgia, serif;
    --mono: 'DM Mono', 'SF Mono', monospace;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 4px rgba(44,31,16,0.06), 0 2px 12px rgba(44,31,16,0.04);
    --shadow-md: 0 4px 16px rgba(44,31,16,0.08), 0 1px 4px rgba(44,31,16,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(210,185,155,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(180,155,125,0.15) 0%, transparent 50%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  button, input, select, textarea { font-family: inherit; }
  button { cursor: pointer; }

  /* ── Layout ── */
  #app-top, #app-calc, #app-log, #app-modal {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
  }
  #app-top { padding-top: 32px; }
  #app-log { padding-bottom: 80px; }

  /* ── Header ── */
  .header {
    margin-bottom: 28px;
  }
  .header-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-title {
    font-size: 24px;
    font-weight: 600;
    font-family: var(--display);
    letter-spacing: -0.01em;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  /* ── Summary Grid ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .summary-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .summary-cell:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .summary-cell .label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
    font-family: var(--sans);
  }
  .summary-cell .value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .summary-cell .sub {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* ── Section Label ── */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  /* ── Holdings ── */
  .holding-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 26px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }
  .holding-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .holding-ticker {
    font-size: 22px;
    font-weight: 600;
    font-family: var(--display);
    letter-spacing: 0;
    margin-bottom: 2px;
  }
  .holding-shares {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }
  .holding-price {
    font-size: 18px;
    font-weight: 600;
    font-family: var(--display);
    text-align: right;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
  }
  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .holding-price-change {
    font-size: 11px;
    font-family: var(--display);
    text-align: right;
    margin-top: 2px;
  }
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--border2);
    border-left: 1px solid var(--border2);
  }
  .metric-cell {
    padding: 14px 0 12px;
    border-right: 1px solid var(--border2);
    border-bottom: 1px solid var(--border2);
    padding-left: 18px;
  }
  .metric-cell .label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .metric-cell .value {
    font-size: 16px;
    font-weight: 600;
    font-family: var(--display);
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 2px;
  }
  .metric-cell .sub {
    font-size: 10px;
    font-family: var(--mono);
  }

  /* ── Chart ── */
  .chart-wrap {
    margin-bottom: 28px;
  }
  .chart-inner {
    padding: 24px 24px 0;
  }
  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    height: 100px;
  }
  .chart-bar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    gap: 6px;
  }
  .chart-bar-val {
    font-size: 11px;
    font-family: var(--display);
    font-weight: 500;
    color: var(--green);
  }
  .chart-bar {
    width: 100%;
    background: linear-gradient(to top, rgba(58,125,68,0.18), rgba(58,125,68,0.08));
    border: 1px solid rgba(58,125,68,0.22);
    border-radius: 6px 6px 0 0;
    min-height: 4px;
    transition: height 0.4s ease;
  }
  .chart-bar-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    padding: 8px 0 16px;
  }

  /* ── Calculator ── */
  .calc-section {
    margin-bottom: 28px;
  }
  .calc-toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
  }
  .calc-toggle-row:hover .section-label { color: var(--text2); }
  .calc-chevron {
    color: var(--text3);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .calc-chevron.open { transform: rotate(90deg); }
  .calc-hint {
    font-size: 11px;
    color: var(--text3);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }

  .calc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .calc-inputs-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .calc-field {
    padding: 14px 16px;
    border-right: 1px solid var(--border);
  }
  .calc-field:last-child { border-right: none; }
  .calc-field label {
    display: block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .calc-field input,
  .calc-field select {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--display);
    color: var(--text);
    padding: 0;
    appearance: none;
  }
  .calc-field input:focus,
  .calc-field select:focus {
    outline: none;
  }
  .calc-field input::placeholder {
    color: var(--text3);
    font-weight: 400;
  }

  .calc-results-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .calc-result-cell {
    padding: 16px 18px;
    border-right: 1px solid var(--border);
  }
  .calc-result-cell:last-child { border-right: none; }
  .calc-result-cell .label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .calc-result-cell .value {
    font-size: 18px;
    font-weight: 600;
    font-family: var(--display);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .calc-result-cell .sub {
    font-size: 10px;
    font-family: var(--sans);
    color: var(--text3);
  }
  .calc-results-row2 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .calc-empty {
    padding: 28px;
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* ── Filters / Trade Log ── */
  .log-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text3); color: var(--text2); background: var(--surface2); }
  .filter-btn.active {
    background: #5c3d1e;
    border-color: #5c3d1e;
    color: #fdf8f2;
  }
  .filter-search {
    margin-left: auto;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    font-size: 11px;
    color: var(--text);
    width: 140px;
  }
  .filter-search:focus { outline: none; border-color: var(--blue); }

  /* ── Trade Table ── */
  .trade-header {
    display: grid;
    grid-template-columns: 20px 80px 50px 70px 90px 70px 100px 90px 1fr;
    gap: 0 8px;
    padding: 10px 20px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .trade-row {
    display: grid;
    grid-template-columns: 20px 80px 50px 70px 90px 70px 100px 90px 1fr;
    gap: 0 8px;
    padding: 14px 20px;
    align-items: center;
    cursor: pointer;
    transition: background 0.1s;
  }
  .trade-row:hover { background: rgba(139,107,78,0.04); }
  .trade-divider { border-bottom: 1px solid var(--border2); }
  .trade-chevron {
    color: var(--text3);
    transition: transform 0.2s;
  }
  .trade-chevron.open { transform: rotate(90deg); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    font-family: var(--sans);
    letter-spacing: 0.02em;
  }
  .badge-open { background: var(--green-bg); color: var(--green); }
  .badge-expired { background: var(--gray-bg); color: var(--gray); }
  .badge-assigned { background: var(--amber-bg); color: var(--amber); }
  .badge-buyback { background: var(--red-bg); color: var(--red); }

  /* ── Trade Detail ── */
  .trade-detail {
    padding: 16px 20px 20px 52px;
    border-top: 1px solid var(--border2);
    background: linear-gradient(to bottom, var(--surface2), rgba(247,243,238,0.5));
  }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }
  .detail-item .label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .detail-item .value {
    font-size: 13px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .ror-grid {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border2);
  }
  .ror-cell .label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 3px;
  }
  .ror-cell .value {
    font-size: 16px;
    font-weight: 600;
    font-family: var(--display);
  }
  .ror-cell .sub {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    margin-top: 1px;
  }

  /* ── Close Trade Actions ── */
  .close-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border2);
    flex-wrap: wrap;
    align-items: center;
  }
  .close-actions-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-right: 4px;
  }
  .close-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    transition: all 0.15s;
  }
  .close-btn-expired {
    background: var(--gray-bg);
    border-color: rgba(113,113,122,0.2);
    color: var(--gray);
  }
  .close-btn-expired:hover { background: rgba(113,113,122,0.14); }
  .close-btn-assigned {
    background: var(--amber-bg);
    border-color: rgba(180,83,9,0.2);
    color: var(--amber);
  }
  .close-btn-assigned:hover { background: rgba(180,83,9,0.14); }
  .close-btn-buyback {
    background: var(--red-bg);
    border-color: rgba(220,38,38,0.2);
    color: var(--red);
  }
  .close-btn-buyback:hover { background: rgba(220,38,38,0.14); }
  .btn-edit {
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.15s;
    margin-left: auto;
  }
  .btn-edit:hover { border-color: var(--text3); color: var(--text); }
  .btn-delete {
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: transparent;
    font-size: 11px;
    color: var(--text3);
    transition: all 0.15s;
  }
  .btn-delete:hover { color: var(--red); background: var(--red-bg); }

  /* ── Buyback Input ── */
  .buyback-inline {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    background: var(--red-bg);
    border: 1px solid rgba(220,38,38,0.15);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
  }
  .buyback-inline label {
    font-size: 11px;
    font-weight: 600;
    color: var(--red);
  }
  .buyback-inline input {
    width: 90px;
    padding: 4px 8px;
    border: 1px solid rgba(220,38,38,0.3);
    border-radius: 6px;
    background: #fff;
    font-size: 13px;
    font-family: var(--mono);
    font-weight: 600;
    color: var(--red);
  }
  .buyback-inline input:focus { outline: none; border-color: var(--red); }
  .buyback-confirm {
    padding: 5px 12px;
    border-radius: 6px;
    border: none;
    background: var(--red);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .buyback-confirm:hover { opacity: 0.85; }
  .buyback-cancel {
    padding: 5px 8px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text3);
    font-size: 11px;
  }

  /* ── Primary Button ── */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 20px;
    border: none;
    background: #5c3d1e;
    color: #fdf8f2;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(92,61,30,0.25);
  }
  .btn-primary:hover { background: #4a3018; box-shadow: 0 4px 12px rgba(92,61,30,0.3); transform: translateY(-1px); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,31,16,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-box {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
    box-shadow: 0 24px 64px rgba(44,31,16,0.18), 0 4px 16px rgba(44,31,16,0.08);
  }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }
  .type-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: var(--bg);
    padding: 3px;
    border-radius: var(--radius-sm);
  }
  .type-toggle button {
    flex: 1;
    padding: 7px;
    border-radius: 6px;
    border: none;
    background: transparent;
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    transition: all 0.15s;
  }
  .type-toggle button.active-cc {
    background: var(--surface);
    color: var(--blue);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .type-toggle button.active-csp {
    background: var(--surface);
    color: var(--purple);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .form-input {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text);
    transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(154,107,26,0.12); }
  .form-select {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text);
    appearance: none;
  }
  .form-select:focus { outline: none; border-color: var(--blue); }
  .save-btn {
    width: 100%;
    padding: 11px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .save-btn.valid { background: #5c3d1e; color: #fdf8f2; }
  .save-btn.valid:hover { opacity: 0.82; }
  .save-btn.invalid { background: var(--border); color: var(--text3); cursor: not-allowed; }

  /* ── Empty State ── */
  .empty-state {

    /* Header */

<script>
// ══════════════════════════════════════════════
// Wheel Tracker v4.1
// ══════════════════════════════════════════════

const INITIAL_POSITIONS = [
  { id: "hood-csp-104", type: "cash_secured_put", ticker: "HOOD", sharesOrContracts: 1, sharePrice: 104, strike: 104, premium: 1.15, openDate: "2025-01-27", expDate: "2025-01-30", status: "closed_assigned", notes: "Assigned Jan 30 — acquired 100 shares at $104" },

  { id: "hood-cc-77", type: "covered_call", ticker: "HOOD", sharesOrContracts: 1, sharePrice: 104, strike: 77, premium: 0.18, openDate: "2025-02-12", expDate: "2025-02-13", status: "closed_buyback", notes: "Sold at $0.75, bought back Feb 13 at $0.57 — net premium $0.18/sh" },
  { id: "hood-cc-80", type: "covered_call", ticker: "HOOD", sharesOrContracts: 1, sharePrice: 104, strike: 80, premium: 0.67, openDate: "2025-02-17", expDate: "2025-02-20", status: "closed_buyback", notes: "Sold at $0.73, bought back Feb 20 at $0.06 — net premium $0.67/sh" },
  { id: "hood-cc-78", type: "covered_call", ticker: "HOOD", sharesOrContracts: 1, sharePrice: 104, strike: 78, premium: 0.30, openDate: "2025-02-24", expDate: "2025-02-27", status: "closed_expired", notes: "Expired worthless — full premium kept" },
  { id: "hood-cc-82", type: "covered_call", ticker: "HOOD", sharesOrContracts: 1, sharePrice: 78.69, strike: 82, premium: 0.46, openDate: "2025-03-11", expDate: "2025-03-13", status: "open", notes: "" },
];

const STATUS_MAP = {
  open:           { label: 'Open',        cls: 'badge-open' },
  closed_expired: { label: 'Expired',     cls: 'badge-expired' },
  closed_assigned:{ label: 'Assigned',    cls: 'badge-assigned' },
  closed_buyback: { label: 'Bought Back', cls: 'badge-buyback' },
};

// ── State ──
let positions = [];
let livePrices = {};
let priceTimestamps = {};
let filterType = 'all';
let filterTicker = '';
let expandedId = null;
let showForm = false;
let editingPos = null;
let formType = 'covered_call';
let showCalc = true;
let calcState = { ticker: '', strike: '', premium: '', days: '7', contracts: '1' };
let buybackInputId = null; // which position is showing buyback prompt
let buybackInputVal = '';

// ── Storage ──
function loadPositions() {
  try {
    const saved = localStorage.getItem('wheel-tracker-positions-v4');
    if (saved) {
      positions = JSON.parse(saved);
      // Merge: add new positions from INITIAL, and update ALL fields including status/notes
      // (INITIAL_POSITIONS is now the source of truth — synced from app via GitHub API)
      INITIAL_POSITIONS.forEach(ip => {
        const idx = positions.findIndex(p => p.id === ip.id);
        if (idx < 0) {
          positions.unshift(ip); // new trade — add it
        } else {
          // INITIAL_POSITIONS wins completely — it was last written by the app
          positions[idx] = { ...ip };
        }
      });
      savePositions();
    } else {
      // Migrate from old key
      const old = localStorage.getItem('wheel-tracker-positions');
      positions = old ? JSON.parse(old) : [...INITIAL_POSITIONS];
      savePositions();
    }
  } catch(e) { positions = [...INITIAL_POSITIONS]; }
}
function savePositions() {
  try { localStorage.setItem('wheel-tracker-positions-v4', JSON.stringify(positions)); } catch(e) {}
}

// ── GitHub Sync — pushes positions to repo so all devices see changes on refresh ──
const SYNC_TOKEN = ['github_pat_11B6VX5YI0elC9BswqnFmD', 'rwHrJyu7sECTY0giAlQjUkCzCvWi7yFbxrMoSPBhJYxCGIRMJKOqcQa9rKV'].join('_');
const SYNC_REPO  = 'MattClauder/Wheel-Tracker';
const SYNC_FILE  = 'index.html';

async function syncToGitHub() {
  try {
    const ind = document.getElementById('sync-indicator');
    if (ind) { ind.textContent = '\u2191 syncing'; ind.style.color = 'var(--text3)'; }

    const metaRes = await fetch('https://api.github.com/repos/' + SYNC_REPO + '/contents/' + SYNC_FILE,
      { headers: { Authorization: 'token ' + SYNC_TOKEN } });
    const meta = await metaRes.json();
    const sha = meta.sha;

    let fileText = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ''))));

    const posLines = positions.map(function(p) {
      return '  { id: ' + JSON.stringify(p.id) +
        ', type: ' + JSON.stringify(p.type) +
        ', ticker: ' + JSON.stringify(p.ticker) +
        ', sharesOrContracts: ' + p.sharesOrContracts +
        ', sharePrice: ' + p.sharePrice +
        ', strike: ' + p.strike +
        ', premium: ' + p.premium +
        ', openDate: ' + JSON.stringify(p.openDate) +
        ', expDate: ' + JSON.stringify(p.expDate) +
        ', status: ' + JSON.stringify(p.status) +
        ', notes: ' + JSON.stringify(p.notes || '') + ' }';
    }).join(',\n');

    const newBlock = 'const INITIAL_POSITIONS = [\n' + posLines + '\n];';
    const marker1 = 'const INITIAL_POSITIONS = [';
    const marker2 = '];';
    const s = fileText.indexOf(marker1);
    const e = fileText.indexOf(marker2, s) + marker2.length;
    fileText = fileText.substring(0, s) + newBlock + fileText.substring(e);

    const encoded = btoa(unescape(encodeURIComponent(fileText)));
    const pushRes = await fetch('https://api.github.com/repos/' + SYNC_REPO + '/contents/' + SYNC_FILE, {
      method: 'PUT',
      headers: { Authorization: 'token ' + SYNC_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Sync positions from app', content: encoded, sha: sha })
    });

    if (pushRes.ok) {
      if (ind) {
        ind.textContent = '\u2713 synced';
        ind.style.color = 'var(--green)';
        setTimeout(function() { if (ind) ind.textContent = ''; }, 3000);
      }
    } else {
      throw new Error('Push failed');
    }
  } catch(e) {
    const ind = document.getElementById('sync-indicator');
    if (ind) {
      ind.textContent = '\u26a0 sync failed';
      ind.style.color = 'var(--red)';
      setTimeout(function() { if (ind) ind.textContent = ''; }, 4000);
    }
    console.error('Sync error:', e);
  }
}

// ── Live Prices ──
async function fetchLivePrice(ticker) {
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + ticker + '?interval=1d&range=1d')}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + ticker + '?interval=1d&range=1d')}`,
  ];
  for (const url of proxies) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const data = await resp.json();
      const result = data.chart?.result?.[0];
      if (result?.meta?.regularMarketPrice) {
        const { regularMarketPrice: price, chartPreviousClose, previousClose } = result.meta;
        const prevClose = chartPreviousClose || previousClose || price;
        livePrices[ticker] = { price, prevClose, change: price - prevClose, changePct: ((price - prevClose) / prevClose * 100) };
        priceTimestamps[ticker] = Date.now();
        return;
      }
    } catch(e) {}
  }
}
async function fetchAllPrices() {
  const tickers = [...new Set(positions.map(p => p.ticker))];
  await Promise.all(tickers.map(t => fetchLivePrice(t)));
  renderTop(); renderCalc();
}
setInterval(() => {
  const d = new Date(); const h = d.getHours(); const day = d.getDay();
  if (day > 0 && day < 6 && h >= 9 && h <= 16) fetchAllPrices();
}, 60000);

// ── Helpers ──
function fmt(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '$0.00';
  const str = Math.abs(n).toFixed(2);
  const parts = str.split('.');
  parts[0] = parts[0].replace(/(\d)(?=(\d{3})+$)/g, '$1,');
  return n < 0 ? `-$${parts.join('.')}` : `$${parts.join('.')}`;
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
}
function genId() { return 'pos-' + Date.now() + '-' + Math.random().toString(36).slice(2,6); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function svgChevron(open, extra) {
  return `<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" class="trade-chevron ${open ? 'open' : ''}" style="${extra||''}"><path d="M6 4l4 4-4 4"/></svg>`;
}

// ── Computed ──
function getStats() {
  const totalPremium = positions.reduce((s, p) => s + p.premium * p.sharesOrContracts * 100, 0);
  const openCount = positions.filter(p => p.status === 'open').length;
  const closedCount = positions.filter(p => p.status !== 'open').length;
  const tickers = [...new Set(positions.map(p => p.ticker))];
  const tickerData = {};
  positions.forEach(p => {
    if (!tickerData[p.ticker]) tickerData[p.ticker] = { totalPremium: 0, sharePrice: 0, shares: 0 };
    tickerData[p.ticker].totalPremium += p.premium * p.sharesOrContracts * 100;
    if (p.type === 'covered_call' || p.status === 'closed_assigned') {
      tickerData[p.ticker].sharePrice = p.sharePrice || p.strike;
      tickerData[p.ticker].shares = Math.max(tickerData[p.ticker].shares, p.sharesOrContracts * 100);
    }
  });
  const monthly = {};
  positions.forEach(p => {
    const m = p.openDate?.slice(0, 7) || 'unknown';
    monthly[m] = (monthly[m] || 0) + p.premium * p.sharesOrContracts * 100;
  });
  return { totalPremium, openCount, closedCount, tickers, tickerData, monthly };
}
function getFiltered() {
  const typeMap = { covered_call: 'cc', cash_secured_put: 'csp' };
  return positions
    .filter(p => {
      if (filterType !== 'all' && typeMap[p.type] !== filterType) return false;
      if (filterTicker && !p.ticker.toUpperCase().includes(filterTicker.toUpperCase())) return false;
      return true;
    })
    .sort((a, b) => (b.openDate || '').localeCompare(a.openDate || ''));
}

// ══════════════════════════════════════════════
// RENDER — split into isolated sections so
// the calculator never causes scroll jumps
// ══════════════════════════════════════════════
function render() {
  renderTop();
  renderCalc();
  renderLog();
  renderModal();
}

function renderTop() {
  const stats = getStats();
  const tickerList = stats.tickers.length > 0 ? stats.tickers : ['HOOD'];
  if (!calcState.ticker && tickerList.length > 0) calcState.ticker = tickerList[0];

  let html = '';

  // ── Header ──
  html += `
  <div class="header">
    <div class="header-eyebrow">Options Premium Tracker · v4.1</div>
    <div class="header-row">
      <div class="header-title">
        <span style="color:#5a7a52">Covered Calls</span>
        <span style="color:var(--text3);margin:0 8px;font-weight:300">&</span>
        <span style="color:#8f5e3a">Cash Secured Puts</span>
      </div>
      <span id="sync-indicator" style="font-size:11px;font-family:var(--mono);margin-right:8px;transition:color 0.3s;"></span>
      <button class="btn-primary" onclick="openForm()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
        Log Trade
      </button>
    </div>
  </div>`;

  // ── Summary ──
  html += `<div class="summary-grid">
    <div class="summary-cell">
      <div class="label">Total Premium</div>
      <div class="value" style="color:var(--green)">${fmt(stats.totalPremium)}</div>
      <div class="sub">${positions.length} trade${positions.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="summary-cell">
      <div class="label">Open Positions</div>
      <div class="value">${stats.openCount}</div>
      <div class="sub">${stats.tickers.length} ticker${stats.tickers.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="summary-cell">
      <div class="label">Closed</div>
      <div class="value">${stats.closedCount}</div>
      <div class="sub">expired / assigned / bought back</div>
    </div>
  </div>`;

  // ── Holdings ──
  const tkKeys = Object.keys(stats.tickerData);
  if (tkKeys.length > 0) {
    html += `<div class="section-label">Holdings</div>`;
    tkKeys.forEach(ticker => {
      const data = stats.tickerData[ticker];
      const lp = livePrices[ticker];
      const cp = lp?.price || null;
      const shares = data.shares;
      const cb = data.sharePrice;
      const unrealPL = cp && shares ? (cp - cb) * shares : null;
      const unrealPct = cb > 0 && cp ? ((cp - cb) / cb * 100) : null;
      const premPerSh = shares > 0 ? data.totalPremium / shares : 0;
      const netBasis = cb - premPerSh;
      const isDown = unrealPL < 0;
      const stale = !priceTimestamps[ticker] || (Date.now() - priceTimestamps[ticker] > 120000);

      html += `<div class="holding-card">
        <div class="holding-header">
          <div>
            <div class="holding-ticker">${esc(ticker)}</div>
            <div class="holding-shares">${shares} shares held</div>
          </div>
          <div>`;
      if (cp) {
        html += `<div class="holding-price">
            ${!stale ? '<span class="live-dot"></span>' : ''}
            $${cp.toFixed(2)}
          </div>
          <div class="holding-price-change">
            <span class="${lp.change >= 0 ? 'up' : 'down'}">${lp.change >= 0 ? '+' : ''}${lp.change.toFixed(2)} (${lp.changePct >= 0 ? '+' : ''}${lp.changePct.toFixed(2)}%)</span>
            ${stale ? ' <span style="color:var(--text3);font-size:9px">·delayed</span>' : ''}
          </div>`;
      } else {
        html += `<div class="holding-price" style="color:var(--text3)">—</div>
          <div class="holding-price-change" style="color:var(--text3);font-size:10px">fetching...</div>`;
      }
      html += `</div></div>
        <div class="metrics-grid">
          <div class="metric-cell">
            <div class="label">Cost Basis</div>
            <div class="value">${fmt(cb)}</div>
            <div class="sub" style="color:var(--text3)">per share</div>
          </div>
          <div class="metric-cell">
            <div class="label">Unrealized P&amp;L</div>
            <div class="value" style="color:${isDown?'var(--red)':'var(--green)'}">${unrealPL !== null ? (isDown?'':'+') + fmt(unrealPL) : '—'}</div>
            <div class="sub" style="color:${isDown?'var(--red)':'var(--green)'}">${unrealPct !== null ? (isDown?'':'+') + unrealPct.toFixed(1) + '%' : ''}</div>
          </div>
          <div class="metric-cell">
            <div class="label">Premium Collected</div>
            <div class="value" style="color:var(--green)">${fmt(data.totalPremium)}</div>
            <div class="sub" style="color:var(--green)">${fmt(premPerSh)}/sh</div>
          </div>
          <div class="metric-cell">
            <div class="label">Net Basis</div>
            <div class="value" style="color:var(--blue)">${fmt(netBasis)}</div>
            <div class="sub" style="color:var(--text3)">after premiums</div>
          </div>
        </div>
      </div>`;
    });
  }

  // ── Monthly Chart ──
  const monthKeys = Object.keys(stats.monthly).sort();
  if (monthKeys.length > 0) {
    html += `<div class="chart-wrap">
      <div class="section-label">Monthly Premium</div>
      <div class="card chart-inner">
        <div class="chart-bars">`;
    const maxVal = Math.max(...Object.values(stats.monthly));
    monthKeys.forEach(month => {
      const val = stats.monthly[month];
      const pct = maxVal > 0 ? (val / maxVal) * 100 : 0;
      html += `<div class="chart-bar-wrap">
        <div class="chart-bar-val">${fmt(val)}</div>
        <div class="chart-bar" style="height:${Math.max(pct,4)}%"></div>
        <div class="chart-bar-label">${month.slice(5)}/${month.slice(2,4)}</div>
      </div>`;
    });
    html += `</div></div></div>`;
  }

  const _sy = window.scrollY;
  document.getElementById('app-top').innerHTML = html;
  window.scrollTo(0, _sy);
}

// ── Calculator render ──
// Full render: builds the whole calculator (called on init / toggle / ticker change)
// calcSet (oninput): only updates the results panel — inputs are NEVER re-rendered while typing
function renderCalc() {
  const stats = getStats();
  const tickerList = stats.tickers.length > 0 ? stats.tickers : ['HOOD'];
  if (!calcState.ticker && tickerList.length > 0) calcState.ticker = tickerList[0];

  let html = `<div class="calc-section">
    <div class="calc-toggle-row" onclick="toggleCalc()">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" class="calc-chevron ${showCalc?'open':''}"><path d="M6 4l4 4-4 4"/></svg>
      <span class="section-label" style="margin-bottom:0">Trade Calculator</span>
      <span class="calc-hint">— plug in an option to see your return</span>
    </div>`;

  if (showCalc) {
    html += `<div class="calc-card">
      <div class="calc-inputs-row">
        <div class="calc-field">
          <label>Ticker</label>
          <select id="calc-ticker" onchange="calcSet('ticker',this.value,true)">
            ${tickerList.map(t => `<option value="${esc(t)}" ${t===calcState.ticker?'selected':''}>${esc(t)}</option>`).join('')}
          </select>
        </div>
        <div class="calc-field">
          <label>Strike</label>
          <input id="calc-strike" type="number" step="0.5" placeholder="85.00"
            oninput="calcSet('strike',this.value)">
        </div>
        <div class="calc-field">
          <label>Premium / sh</label>
          <input id="calc-premium" type="number" step="0.01" placeholder="0.50"
            oninput="calcSet('premium',this.value)">
        </div>
        <div class="calc-field">
          <label>Days to Exp</label>
          <input id="calc-days" type="number" min="1" placeholder="7"
            oninput="calcSet('days',this.value)">
        </div>
        <div class="calc-field">
          <label>Contracts</label>
          <input id="calc-contracts" type="number" min="1" placeholder="1"
            oninput="calcSet('contracts',this.value)">
        </div>
      </div>
      <div id="calc-results-panel"></div>
    </div>`;
  }
  html += `</div>`;

  // Preserve scroll position — innerHTML swap can cause scroll jumps
  const scrollY = window.scrollY;
  document.getElementById('app-calc').innerHTML = html;
  window.scrollTo(0, scrollY);

  // Restore input values (without touching focus/cursor — inputs have no value attr so browser owns them)
  if (showCalc) {
    const fields = { 'calc-strike': 'strike', 'calc-premium': 'premium', 'calc-days': 'days', 'calc-contracts': 'contracts' };
    Object.entries(fields).forEach(([id, key]) => {
      const el = document.getElementById(id);
      if (el && calcState[key] !== undefined && calcState[key] !== '') el.value = calcState[key];
    });
    // Render initial results
    updateCalcResults();
  }
}

// Only touches #calc-results-panel — inputs are completely untouched, no scroll, no cursor issues
function updateCalcResults() {
  const panel = document.getElementById('calc-results-panel');
  if (!panel) return;

  const stats = getStats();
  const ti = stats.tickerData[calcState.ticker];
  const cp = livePrices[calcState.ticker]?.price || 0;
  const cb = ti?.sharePrice || 0;
  const totalPremSoFar = ti?.totalPremium || 0;
  const sh = ti?.shares || 100;
  const pps = sh > 0 ? totalPremSoFar / sh : 0;
  const nb = cb - pps;
  const strike = parseFloat(calcState.strike) || 0;
  const prem = parseFloat(calcState.premium) || 0;
  const days = parseInt(calcState.days) || 7;
  const contracts = parseInt(calcState.contracts) || 1;
  const totalPremNew = prem * contracts * 100;
  const curVal = cp * contracts * 100;
  const weeklyRet = curVal > 0 ? (totalPremNew / curVal * 100) : 0;
  const annRet = days > 0 ? (weeklyRet * (365 / days)) : 0;
  const dist = cp > 0 ? ((strike - cp) / cp * 100) : 0;
  const weeksRecover = totalPremNew > 0 ? Math.ceil(Math.abs((cp - cb) * contracts * 100) / totalPremNew) : 0;
  const newNB = cb - pps - (sh > 0 ? prem * contracts * 100 / sh : 0);
  const ifAssigned = (strike - cb) * contracts * 100 + totalPremSoFar + totalPremNew;

  if (strike > 0 && prem > 0) {
    const distColor = dist > 5 ? 'var(--green)' : dist > 0 ? 'var(--amber)' : 'var(--red)';
    const safeLabel = dist > 10 ? 'High' : dist > 5 ? 'Medium' : dist > 0 ? 'Low' : 'ITM!';
    const safeColor = dist > 10 ? 'var(--green)' : dist > 5 ? 'var(--amber)' : 'var(--red)';
    panel.innerHTML = `
      <div class="calc-results-row">
        <div class="calc-result-cell">
          <div class="label">Collect</div>
          <div class="value" style="color:var(--green)">${fmt(totalPremNew)}</div>
          <div class="sub">${contracts} contract${contracts!==1?'s':''}</div>
        </div>
        <div class="calc-result-cell">
          <div class="label">Return (${days}d)</div>
          <div class="value" style="color:var(--green)">${weeklyRet.toFixed(2)}%</div>
          <div class="sub">${annRet.toFixed(1)}% ann.</div>
        </div>
        <div class="calc-result-cell">
          <div class="label">Distance</div>
          <div class="value" style="color:${distColor}">${dist>=0?'+':''}${dist.toFixed(1)}%</div>
          <div class="sub">${fmt(Math.abs(strike-cp))} away</div>
        </div>
        <div class="calc-result-cell">
          <div class="label">Safety</div>
          <div class="value" style="color:${safeColor}">${safeLabel}</div>
        </div>
      </div>
      <div class="calc-results-row2">
        <div class="calc-result-cell">
          <div class="label">New Net Basis</div>
          <div class="value" style="color:var(--blue)">${fmt(newNB)}</div>
          <div class="sub">from ${fmt(nb)}</div>
        </div>
        <div class="calc-result-cell">
          <div class="label">Wks to Recover</div>
          <div class="value" style="color:var(--text2)">${weeksRecover > 0 ? '~'+weeksRecover+'wk' : '—'}</div>
        </div>
        <div class="calc-result-cell">
          <div class="label">If Assigned P&amp;L</div>
          <div class="value" style="color:${ifAssigned>=0?'var(--green)':'var(--red)'}">${ifAssigned>=0?'+':''}${fmt(ifAssigned)}</div>
          <div class="sub">sold @ ${fmt(strike)}</div>
        </div>
        <div class="calc-result-cell">
          <div class="label">Wks to Recoup</div>
          <div class="value" style="color:var(--text2)">${weeksRecover>0?'~'+weeksRecover+'wk':'—'}</div>
          <div class="sub">at this rate</div>
        </div>
      </div>`;
  } else {
    panel.innerHTML = `<div class="calc-empty">Enter a strike and premium to see your return breakdown</div>`;
  }
}

// ── Trade Log render ──
function renderLog() {
  const filtered = getFiltered();
  let html = '';

  // ── Trade Log ──
  html += `<div class="log-header">
    <div class="section-label" style="margin-bottom:0">Trade Log</div>
    <button class="filter-btn ${filterType==='all'?'active':''}" onclick="setFilter('all')">All</button>
    <button class="filter-btn ${filterType==='cc'?'active':''}" onclick="setFilter('cc')">CC</button>
    <button class="filter-btn ${filterType==='csp'?'active':''}" onclick="setFilter('csp')">CSP</button>
    <input class="filter-search" placeholder="Search ticker…" value="${esc(filterTicker)}" oninput="setTickerFilter(this.value)">
  </div>`;

  if (filtered.length === 0) {
    html += `<div class="card"><div class="empty-state">No positions yet — click "Log Trade" to get started</div></div>`;
  } else {
    html += `<div class="card">
      <div class="trade-header">
        <div></div>
        <div>Ticker</div>
        <div>Type</div>
        <div>Strike</div>
        <div>Premium</div>
        <div>RoR</div>
        <div>Status</div>
        <div>Date</div>
        <div style="text-align:right">Total</div>
      </div>`;

    filtered.forEach((pos, i) => {
      const totalPrem = pos.premium * pos.sharesOrContracts * 100;
      const isCC = pos.type === 'covered_call';
      const st = STATUS_MAP[pos.status] || STATUS_MAP.open;
      const isExp = expandedId === pos.id;
      const capRisk = (pos.sharePrice || pos.strike) * pos.sharesOrContracts * 100;
      const ror = capRisk > 0 ? (totalPrem / capRisk * 100) : 0;
      const daysHeld = pos.openDate && pos.expDate
        ? Math.max(1, Math.round((new Date(pos.expDate+'T00:00:00') - new Date(pos.openDate+'T00:00:00')) / 86400000))
        : null;
      const ann = daysHeld ? (ror * (365 / daysHeld)) : null;
      const isOpen = pos.status === 'open';

      html += `<div class="${i < filtered.length - 1 ? 'trade-divider' : ''}">
        <div class="trade-row" onclick="toggleExpand('${pos.id}')">
          <div>${svgChevron(isExp)}</div>
          <div style="font-weight:600;font-size:13px;font-family:var(--display)">${esc(pos.ticker)}</div>
          <div style="font-size:10px;font-weight:700;font-family:var(--sans);color:${isCC?'var(--blue)':'var(--purple)'}">${isCC?'CC':'CSP'}</div>
          <div style="font-size:13px;font-family:var(--display);color:var(--text2)">$${pos.strike}</div>
          <div style="font-size:12px;font-family:var(--display);color:var(--text2)">$${pos.premium.toFixed(2)}/sh</div>
          <div style="font-size:12px;font-weight:600;font-family:var(--display);color:var(--green)">${ror.toFixed(2)}%</div>
          <div><span class="badge ${st.cls}">${st.label}</span></div>
          <div style="font-size:11px;font-family:var(--sans);color:var(--text3)">${fmtDate(pos.openDate)}</div>
          <div style="text-align:right;font-size:13px;font-weight:600;font-family:var(--display);color:var(--green)">+${fmt(totalPrem)}</div>
        </div>`;

      if (isExp) {
        html += `<div class="trade-detail">
          <div class="ror-grid">
            <div class="ror-cell">
              <div class="label">Return on Risk</div>
              <div class="value" style="color:var(--green)">${ror.toFixed(2)}%</div>
              <div class="sub">${fmt(totalPrem)} / ${fmt(capRisk)}</div>
            </div>
            <div class="ror-cell">
              <div class="label">Annualized</div>
              <div class="value" style="color:var(--green)">${ann ? ann.toFixed(1)+'%' : '—'}</div>
              <div class="sub">${daysHeld ? daysHeld+' day'+(daysHeld!==1?'s':'')+' held' : '—'}</div>
            </div>
            <div class="ror-cell">
              <div class="label">Capital at Risk</div>
              <div class="value" style="color:var(--text2)">${fmt(capRisk)}</div>
              <div class="sub">${pos.sharesOrContracts*100} sh × ${fmt(pos.sharePrice||pos.strike)}</div>
            </div>
          </div>
          <div class="detail-grid">
            <div class="detail-item">
              <div class="label">${isCC?'Share Price':'Share Price'}</div>
              <div class="value">${fmt(pos.sharePrice||pos.strike)}</div>
            </div>
            <div class="detail-item">
              <div class="label">Contracts</div>
              <div class="value">${pos.sharesOrContracts} (${pos.sharesOrContracts*100} sh)</div>
            </div>
            <div class="detail-item">
              <div class="label">Expiration</div>
              <div class="value">${fmtDate(pos.expDate)}</div>
            </div>
            <div class="detail-item">
              <div class="label">Total Premium</div>
              <div class="value" style="color:var(--green);font-weight:700">${fmt(totalPrem)}</div>
            </div>
          </div>
          ${pos.notes ? `<div style="font-size:11px;color:var(--text3);font-style:italic;font-family:var(--mono);line-height:1.6;margin-bottom:4px">${esc(pos.notes)}</div>` : ''}
          <div class="close-actions">`;

        if (isOpen) {
          html += `<span class="close-actions-label">Close as:</span>
            <button class="close-btn close-btn-expired" onclick="event.stopPropagation();closePosition('${pos.id}','closed_expired')">
              ✓ Expired Worthless
            </button>
            <button class="close-btn close-btn-assigned" onclick="event.stopPropagation();closePosition('${pos.id}','closed_assigned')">
              ⬆ ${isCC ? 'Called Away' : 'Assigned'}
            </button>
            <button class="close-btn close-btn-buyback" onclick="event.stopPropagation();showBuybackInput('${pos.id}')">
              ✕ Bought Back
            </button>`;
        } else {
          html += `<span style="font-size:11px;font-family:var(--mono);color:var(--text3)">Closed</span>
            <button class="close-btn" style="background:var(--blue-bg);border-color:rgba(61,107,158,0.2);color:var(--blue)" onclick="event.stopPropagation();reopenPosition('${pos.id}')">
              ↩ Reopen
            </button>`;
        }

        html += `
            <button class="btn-edit" onclick="event.stopPropagation();editPosition('${pos.id}')">Edit</button>
            <button class="btn-delete" onclick="event.stopPropagation();deletePosition('${pos.id}')" title="Delete">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M5.3 4V2.7a1 1 0 011-1h3.4a1 1 0 011 1V4M6.3 7v4.5M9.7 7v4.5M3.5 4l.8 9.3a1 1 0 001 .9h5.4a1 1 0 001-.9L12.5 4"/></svg>
            </button>
          </div>`;

        // Buyback inline input
        if (buybackInputId === pos.id) {
          html += `<div class="buyback-inline" onclick="event.stopPropagation()">
            <label>Bought back at:</label>
            <input type="number" step="0.01" placeholder="0.10" value="${esc(buybackInputVal)}"
              oninput="buybackInputVal=this.value" id="buyback-price-input">
            <button class="buyback-confirm" onclick="confirmBuyback('${pos.id}')">Confirm</button>
            <button class="buyback-cancel" onclick="cancelBuyback()">Cancel</button>
          </div>`;
        }

        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  document.getElementById('app-log').innerHTML = html;
}

// ── Modal render — completely separate so it never scrolls anything ──
function renderModal() {
  const container = document.getElementById('app-modal');
  if (!showForm) { container.innerHTML = ''; return; }

  const f = editingPos || {
    type: formType, ticker: '', sharesOrContracts: 1,
    sharePrice: '', strike: '', premium: '', openDate: new Date().toISOString().split('T')[0],
    expDate: '', status: 'open', notes: ''
  };
  const isCC = (editingPos ? editingPos.type : formType) === 'covered_call';
  const valid = f.ticker && f.premium && f.strike;

  container.innerHTML = `<div class="modal-overlay" onclick="closeForm()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">${editingPos ? 'Edit Trade' : 'Log a Trade'}</div>
      <div class="type-toggle">
        <button class="${(editingPos?editingPos.type:formType)==='covered_call'?'active-cc':''}" onclick="formSetType('covered_call')">Covered Call</button>
        <button class="${(editingPos?editingPos.type:formType)==='cash_secured_put'?'active-csp':''}" onclick="formSetType('cash_secured_put')">Cash Secured Put</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Ticker</label>
          <input class="form-input" id="f-ticker" value="${esc(f.ticker||'')}" placeholder="HOOD" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="form-group">
          <label class="form-label">Contracts</label>
          <input class="form-input" id="f-contracts" type="number" value="${f.sharesOrContracts||1}">
        </div>
        <div class="form-group">
          <label class="form-label">${isCC?'Your Avg Share Price':'Current Share Price'}</label>
          <input class="form-input" id="f-sharePrice" type="number" step="0.01" value="${f.sharePrice||''}" placeholder="104.00">
        </div>
        <div class="form-group">
          <label class="form-label">Strike Price</label>
          <input class="form-input" id="f-strike" type="number" step="0.5" value="${f.strike||''}" placeholder="110.00">
        </div>
        <div class="form-group">
          <label class="form-label">Premium / share (net)</label>
          <input class="form-input" id="f-premium" type="number" step="0.01" value="${f.premium||''}" placeholder="0.75">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="f-status">
            <option value="open" ${f.status==='open'?'selected':''}>Open</option>
            <option value="closed_expired" ${f.status==='closed_expired'?'selected':''}>Expired Worthless</option>
            <option value="closed_assigned" ${f.status==='closed_assigned'?'selected':''}>Assigned</option>
            <option value="closed_buyback" ${f.status==='closed_buyback'?'selected':''}>Bought Back</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Open Date</label>
          <input class="form-input" id="f-openDate" type="date" value="${f.openDate||''}">
        </div>
        <div class="form-group">
          <label class="form-label">Expiration Date</label>
          <input class="form-input" id="f-expDate" type="date" value="${f.expDate||''}">
        </div>
        <div class="form-group full">
          <label class="form-label">Notes (optional)</label>
          <input class="form-input" id="f-notes" value="${esc(f.notes||'')}" placeholder="e.g. Sold at $0.80, target buyback at $0.10">
        </div>
      </div>
      <button class="save-btn ${valid?'valid':'invalid'}" onclick="saveForm()">${editingPos?'Save Changes':'Log Trade'}</button>
    </div>
  </div>`;
}

// ── Event Handlers ──
function openForm() { showForm = true; editingPos = null; renderModal(); }
function closeForm() { showForm = false; editingPos = null; renderModal(); }

function formSetType(t) {
  formType = t;
  if (editingPos) editingPos.type = t;
  // Preserve form values when switching type
  const fields = ['f-ticker','f-contracts','f-sharePrice','f-strike','f-premium','f-openDate','f-expDate','f-notes','f-status'];
  const vals = {};
  fields.forEach(id => { const el = document.getElementById(id); if (el) vals[id] = el.value; });
  renderModal();
  fields.forEach(id => { const el = document.getElementById(id); if (el && vals[id] !== undefined) el.value = vals[id]; });
}

function saveForm() {
  const ticker = document.getElementById('f-ticker')?.value?.toUpperCase();
  const strike = parseFloat(document.getElementById('f-strike')?.value);
  const premium = parseFloat(document.getElementById('f-premium')?.value);
  if (!ticker || !strike || !premium) return;
  const currentFormType = editingPos ? editingPos.type : formType;
  const pos = {
    id: editingPos ? editingPos.id : genId(),
    type: currentFormType,
    ticker,
    sharesOrContracts: parseInt(document.getElementById('f-contracts')?.value) || 1,
    sharePrice: parseFloat(document.getElementById('f-sharePrice')?.value) || strike,
    strike, premium,
    openDate: document.getElementById('f-openDate')?.value || '',
    expDate: document.getElementById('f-expDate')?.value || '',
    status: document.getElementById('f-status')?.value || 'open',
    notes: document.getElementById('f-notes')?.value || '',
  };
  if (editingPos) {
    const idx = positions.findIndex(p => p.id === pos.id);
    if (idx >= 0) positions[idx] = pos;
  } else {
    positions.unshift(pos);
    if (!calcState.ticker) calcState.ticker = ticker;
  }
  savePositions();
  showForm = false; editingPos = null;
  savePositions(); syncToGitHub();
  if (!livePrices[ticker]) fetchLivePrice(ticker).then(() => { renderTop(); renderCalc(); });
  renderTop(); renderLog(); renderModal();
}

function editPosition(id) {
  const pos = positions.find(p => p.id === id);
  if (pos) { editingPos = {...pos}; formType = pos.type; showForm = true; renderModal(); }
}

function reopenPosition(id) {
  const pos = positions.find(p => p.id === id);
  if (!pos) return;
  pos.status = 'open';
  pos.notes = (pos.notes ? pos.notes + ' · ' : '') + 'Reopened';
  savePositions(); syncToGitHub(); renderTop(); renderLog();
}

function deletePosition(id) {
  if (confirm('Delete this position?')) {
    positions = positions.filter(p => p.id !== id);
    expandedId = null;
    savePositions(); renderTop(); renderLog();
  }
}

function toggleExpand(id) {
  buybackInputId = null; buybackInputVal = '';
  expandedId = expandedId === id ? null : id;
  renderLog();
}

function setFilter(t) { filterType = t; renderLog(); }
function setTickerFilter(v) { filterTicker = v; renderLog(); }
function toggleCalc() { showCalc = !showCalc; renderCalc(); }

// Calculator — oninput calls calcSet which ONLY updates the results panel
// The inputs themselves are never re-rendered while typing — cursor stays correct
function calcSet(key, val, fullRender) {
  calcState[key] = val;
  if (fullRender) {
    renderCalc(); // ticker change: need to rebuild select options
  } else {
    updateCalcResults(); // typing: only update the results div, never touch inputs
  }
}

// Close position shortcuts
function closePosition(id, status) {
  const pos = positions.find(p => p.id === id);
  if (!pos) return;
  pos.status = status;
  if (status === 'closed_expired') {
    pos.notes = (pos.notes ? pos.notes + ' · ' : '') + 'Expired worthless — full premium kept';
  } else if (status === 'closed_assigned') {
    pos.notes = (pos.notes ? pos.notes + ' · ' : '') + 'Assigned at expiration';
  }
  savePositions(); syncToGitHub(); renderTop(); renderLog();
}

function showBuybackInput(id) {
  buybackInputId = id;
  buybackInputVal = '';
  renderLog();
  setTimeout(() => { const el = document.getElementById('buyback-price-input'); if (el) el.focus(); }, 30);
}

function cancelBuyback() { buybackInputId = null; buybackInputVal = ''; renderLog(); }

function confirmBuyback(id) {
  const buybackPrice = parseFloat(document.getElementById('buyback-price-input')?.value);
  const pos = positions.find(p => p.id === id);
  if (!pos) return;
  pos.status = 'closed_buyback';
  if (!isNaN(buybackPrice) && buybackPrice > 0) {
    const netPrem = pos.premium - buybackPrice;
    pos.premium = Math.max(0, netPrem);
    pos.notes = (pos.notes ? pos.notes + ' · ' : '') + `Bought back @ $${buybackPrice.toFixed(2)}/sh — net $${Math.max(0,netPrem).toFixed(2)}/sh`;
  } else {
    pos.notes = (pos.notes ? pos.notes + ' · ' : '') + 'Bought back';
  }
  buybackInputId = null; buybackInputVal = '';
  savePositions(); syncToGitHub(); renderTop(); renderLog();
}

// ── Init ──
loadPositions();
render();
fetchAllPrices();
</script>
